apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-two
  labels:
    app: app-two
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app-two
  template:
    metadata:
      labels:
        app: app-two
    spec:
      containers:
        - name: app-two
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      initContainers:
        - name: init-html
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - >-
              HOSTNAME_VAL=$(hostname);
              KERNEL_VAL=$(uname -sr);
              echo "<!DOCTYPE html><html><head><title>Hello Kubernetes!</title>
              <link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Ubuntu:300'>
              <style>body{font-family:Ubuntu,sans-serif;text-align:center;padding:40px;background:#f5f5f5}
              .logo{width:200px}h1{color:#326ce5}table{margin:20px auto;border-collapse:collapse}
              th,td{padding:8px 16px;border:1px solid #ddd;text-align:left}</style></head>
              <body><img class='logo' src='https://kubernetes.io/images/kubernetes-horizontal-color.png'/>
              <h1>Hello from app2.</h1>
              <table><tr><th>pod:</th><td>$HOSTNAME_VAL</td></tr>
              <tr><th>node:</th><td>$KERNEL_VAL</td></tr></table>
              </body></html>" > /html/index.html
          volumeMounts:
            - name: html
              mountPath: /html
      volumes:
        - name: html
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: app-two
spec:
  type: ClusterIP
  selector:
    app: app-two
  ports:
    - port: 80
      targetPort: 80
